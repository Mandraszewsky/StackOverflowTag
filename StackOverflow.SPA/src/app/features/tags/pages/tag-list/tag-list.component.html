<div class="tag-list-header">
  <h2>Tags</h2>
  <button mat-raised-button color="primary" (click)="onRefresh()" [disabled]="store.loading()">
    <mat-icon>refresh</mat-icon>
    Refresh from StackOverflow
  </button>
</div>

<div class="table-wrapper">
  <mat-progress-bar mode="indeterminate" [class.hidden]="!store.loading()"></mat-progress-bar>

  <div class="table-container mat-elevation-z2">
  <table mat-table [dataSource]="store.tags()" matSort (matSortChange)="onSortChange($event)">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header="name">Name</th>
      <td mat-cell *matCellDef="let tag">{{ tag.name }}</td>
    </ng-container>

    <ng-container matColumnDef="count">
      <th mat-header-cell *matHeaderCellDef mat-sort-header="count">Count</th>
      <td mat-cell *matCellDef="let tag">{{ tag.count | number }}</td>
    </ng-container>

    <ng-container matColumnDef="percentage">
      <th mat-header-cell *matHeaderCellDef mat-sort-header="percentage">Share (%)</th>
      <td mat-cell *matCellDef="let tag">{{ tag.percentage | number:'1.2-4' }}%</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
        @if (!store.loading()) {
          No tags found. Click "Refresh from StackOverflow" to fetch tags.
        }
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="store.totalCount()"
    [pageIndex]="store.currentPage() - 1"
    [pageSize]="store.pageSize()"
    [pageSizeOptions]="[10, 25, 50, 100]"
    (page)="onPageChange($event)"
    showFirstLastButtons>
  </mat-paginator>
  </div>
</div>
